<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pplx-proxy debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--font:'SF Mono',Consolas,monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.hdr{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.hdr h1{font-size:12px;color:var(--accent)}
.hdr select,.hdr input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font:10px var(--font)}
.hdr label{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:3px}
.hdr input[type=checkbox]{width:auto}
.hdr button{border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font:10px var(--font);color:var(--text)}
.main{flex:1;display:flex;overflow:hidden}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dbg{width:360px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dbg-h{padding:5px 8px;border-bottom:1px solid var(--border);font-size:9px;color:var(--dim);display:flex;justify-content:space-between}
.dbg-b{flex:1;overflow-y:auto;padding:5px;font-size:9px;white-space:pre-wrap;word-break:break-all;color:var(--dim)}
.msgs{flex:1;overflow-y:auto;padding:10px}
.m{margin-bottom:8px;padding:8px 10px;border-radius:6px;max-width:85%;font-size:11px;line-height:1.5}
.m.u{background:#1f6feb33;margin-left:auto;border:1px solid #1f6feb55}
.m.a{background:var(--card);border:1px solid var(--border)}
.m.e{background:#f8514922;border:1px solid #f8514955;color:var(--red)}
.m .th{background:#1f2937;padding:5px;border-radius:4px;margin-bottom:5px;font-size:9px;color:var(--yellow);border-left:3px solid var(--yellow);max-height:120px;overflow-y:auto}
.m .tc{background:#3fb95011;padding:5px;border-radius:4px;margin-bottom:5px;font-size:9px;color:var(--green);border-left:3px solid var(--green)}
.m .mt{font-size:8px;color:var(--dim);margin-top:3px}
.m .w{font-size:9px;color:var(--red);margin-top:2px}
.bar{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}
.bar input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font:11px var(--font)}
.bar button{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font:10px var(--font);font-weight:600}
.bar button:disabled{opacity:0.4}
.bar .sec{background:var(--border)}
.bg{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:600}
.bg.ok{background:#3fb95033;color:var(--green)}.bg.tl{background:#58a6ff33;color:var(--accent)}
</style>
</head>
<body>
<div class="hdr">
<h1>pplx-proxy debug</h1>
<select id="mdl"><option value="gpt">gpt</option><option value="sonnet" selected>sonnet</option><option value="gemini">gemini</option><option value="nemotron">nemotron</option><option value="sonar">sonar</option><option value="auto">auto</option></select>
<label><input type="checkbox" id="thk">thinking</label>
<label><input type="checkbox" id="str" checked>stream</label>
<button id="tlb" onclick="tglTools()" style="background:var(--border)">Tools OFF</button>
<input id="key" placeholder="API key" style="width:90px">
<span style="font-size:9px;color:var(--dim)" id="st">ready</span>
</div>
<div class="main">
<div class="chat">
<div class="msgs" id="msgs"></div>
<div class="bar">
<input id="inp" placeholder="Type a message..." autofocus>
<button id="btn" onclick="go()">Send</button>
<button class="sec" onclick="clr()">Clear</button>
</div>
</div>
<div class="dbg">
<div class="dbg-h"><span>Raw</span><span id="dm"></span></div>
<div class="dbg-b" id="db"></div>
</div>
</div>
<script>
const B=location.origin,TOOLS=[
{type:"function",function:{name:"get_weather",description:"Get current weather for a city",parameters:{type:"object",properties:{city:{type:"string",description:"City name"},units:{type:"string",enum:["celsius","fahrenheit"]}},required:["city"]}}},
{type:"function",function:{name:"calculator",description:"Evaluate a math expression",parameters:{type:"object",properties:{expression:{type:"string",description:"Math expression"}},required:["expression"]}}},
{type:"function",function:{name:"search_web",description:"Search the web",parameters:{type:"object",properties:{query:{type:"string"},max_results:{type:"integer"}},required:["query"]}}},
{type:"function",function:{name:"get_user",description:"Look up user by ID",parameters:{type:"object",properties:{user_id:{type:"integer"}},required:["user_id"]}}},
{type:"function",function:{name:"send_email",description:"Send an email",parameters:{type:"object",properties:{to:{type:"string"},subject:{type:"string"},body:{type:"string"}},required:["to","subject","body"]}}}
];
let H=[],tl=false;
const $=id=>document.getElementById(id);
$('inp').onkeydown=e=>{if(e.key==='Enter')go()};
function L(t){$('db').textContent+=t+'\n';$('db').scrollTop=9e9}
function E(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tglTools(){tl=!tl;$('tlb').style.background=tl?'var(--green)':'var(--border)';$('tlb').textContent=tl?'Tools ON':'Tools OFF'}
function clr(){H=[];$('msgs').innerHTML='';$('db').textContent=''}
function addM(r,c,x={}){
let d=document.createElement('div');d.className='m '+(r==='user'?'u':r==='error'?'e':'a');
let h='';
if(x.rc)h+=`<div class="th"><b>🧠 reasoning</b><br>${E(x.rc)}</div>`;
if(x.tc)h+=`<div class="tc">🔧 tool_calls\n${x.tc.map(t=>'  '+t.function?.name+'('+t.function?.arguments+')').join('\n')}</div>`;
h+=`<div>${E(c)}</div>`;
let ci=(c||'').match(/\[\d+\]/g);
if(ci)h+=`<div class="w">⚠️ citations: ${ci.join(' ')}</div>`;
if(x.fr)h+=`<div class="mt">${x.fr} | ${x.md||'?'} | ${x.ms||'?'}ms</div>`;
d.innerHTML=h;$('msgs').appendChild(d);$('msgs').scrollTop=9e9;return d}

async function go(){
let t=$('inp').value.trim();if(!t)return;$('inp').value='';
let md=$('mdl').value,th=$('thk').checked,sr=$('str').checked,k=$('key').value;
H.push({role:'user',content:t});addM('user',t);
let body={model:md,messages:[...H],stream:sr,thinking:th};
if(tl)body.tools=TOOLS;
L('\n=== REQ ===\n'+JSON.stringify(body,null,2));
$('st').textContent='...';$('btn').disabled=true;
let hd={'Content-Type':'application/json'};if(k)hd.Authorization='Bearer '+k;
try{
let t0=Date.now(),r=await fetch(B+'/v1/chat/completions',{method:'POST',headers:hd,body:JSON.stringify(body)});
if(!r.ok)throw new Error('HTTP '+r.status+': '+await r.text());
if(!sr){
let d=await r.json(),ms=Date.now()-t0;
L('\n=== RESP ('+ms+'ms) ===\n'+JSON.stringify(d,null,2));
let m=d.choices?.[0]?.message||{},fr=d.choices?.[0]?.finish_reason||'?';
H.push({role:'assistant',content:m.content||''});
addM('a',m.content,{rc:m.reasoning_content,tc:m.tool_calls,fr,md:d.model,ms});
$('dm').textContent=fr+' | '+d.model+' | '+ms+'ms';
}else{
let rd=r.body.getReader(),dc=new TextDecoder(),buf='',fc='',fr_='',tc=null,fn=null,rm=md;
let dv=addM('a','');L('\n=== STREAM ===');
while(true){let{done,value}=await rd.read();if(done)break;
buf+=dc.decode(value,{stream:true});let ls=buf.split('\n');buf=ls.pop();
for(let l of ls){if(!l.startsWith('data: '))continue;let s=l.slice(6).trim();
if(s==='[DONE]'){L('[DONE]');continue}
try{let c=JSON.parse(s),dl=c.choices?.[0]?.delta||{},f=c.choices?.[0]?.finish_reason;rm=c.model||rm;
if(dl.reasoning_content){fr_+=dl.reasoning_content;L('δ think: '+dl.reasoning_content.slice(0,50))}
if(dl.content){fc+=dl.content;if(fc.length<100||fc.length%200<dl.content.length)L('δ text: '+dl.content.slice(0,60))}
if(dl.tool_calls){tc=dl.tool_calls;L('δ tools: '+JSON.stringify(dl.tool_calls))}
if(f){fn=f;L('finish: '+f)}
}catch(e){L('err: '+e.message)}}
let h='';if(fr_)h+=`<div class="th"><b>🧠 reasoning</b><br>${E(fr_)}</div>`;
if(tc)h+=`<div class="tc">🔧 tool_calls\n${tc.map(t=>'  '+t.function?.name+'('+t.function?.arguments+')').join('\n')}</div>`;
h+=`<div>${E(fc)}</div>`;
if(fn)h+=`<div class="mt">${fn} | ${rm} | ${((Date.now()-t0)/1000).toFixed(1)}s</div>`;
dv.innerHTML=h;$('msgs').scrollTop=9e9}
H.push({role:'assistant',content:fc});
$('dm').textContent=(fn||'?')+' | '+rm+' | '+fc.length+'ch';
}
}catch(e){L('\n=== ERR ===\n'+e.message);addM('error',e.message)}
$('st').textContent='ready';$('btn').disabled=false;$('inp').focus()}
</script>
</body>
</html>
